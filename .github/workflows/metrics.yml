name: Metrics

on:
  # Refresh the stats every day at 00:00 UTC
  schedule:
    - cron: "0 0 * * *"
  # Allow manual runs from the Actions tab
  workflow_dispatch:
  # Regenerate on pushes to main so a fresh SVG appears right away
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    steps:
      - name: Main stats (overview + languages)
        uses: lowlighter/metrics@latest
        with:
          # A classic PAT (scope: read access to your repos) stored as a repo secret.
          # Settings > Secrets and variables > Actions > New repository secret > name: METRICS_TOKEN
          token: ${{ secrets.METRICS_TOKEN }}
          user: bmariesan
          filename: github-metrics.svg
          template: classic
          base: header, activity, community, repositories, metadata
          config_timezone: Europe/Bucharest
          plugin_languages: yes
          plugin_languages_ignored: html, css
          plugin_languages_limit: 8
          plugin_languages_colors: github

      - name: Isometric contribution calendar
        uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: bmariesan
          filename: github-metrics-isocalendar.svg
          template: classic
          base: ""
          config_timezone: Europe/Bucharest
          plugin_isocalendar: yes
          plugin_isocalendar_duration: full-year
